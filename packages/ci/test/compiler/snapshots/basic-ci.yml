name: CI
on:
  pull_request: {}
  push:
    branches:
      - main
jobs:
  lint:
    name: lint
    runs-on: ubicloud-standard-2
    steps:
      - name: Checkout
        uses: 'actions/checkout@v4'
      - name: Setup Node.js 20
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
  test:
    name: test
    runs-on: ubicloud-standard-4
    needs: lint
    steps:
      - name: Checkout
        uses: 'actions/checkout@v4'
      - name: Setup Node.js 20
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
