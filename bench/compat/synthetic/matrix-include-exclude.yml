# Synthetic compat fixture — verifies matrix `include:` and `exclude:`
# semantics match GitHub Actions.
#
# Base matrix: 3×2 = 6 cells. `exclude:` removes one specific (node, env)
# pair — leaves 5. `include:` adds an extra (node=18, env=prod, extra=foo)
# combination — leaves 6.
#
# Each cell echoes its identity; the verify step at the bottom counts
# expected cell IDs to confirm we have exactly the right set.
#
# Pre-this fixture, matrix include/exclude semantics were unit-tested in
# isolation (planner.ts) but no end-to-end fixture caught regressions
# where the planner emits a different cell set than GH Actions.
name: matrix include + exclude
on:
  workflow_dispatch: {}
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [16, 18, 20]
        env: [dev, prod]
        # Remove the (16, prod) cell — leaves 5 base cells.
        exclude:
          - node: 16
            env: prod
        # Add an extra cell with an additional `extra` variable.
        include:
          - node: 18
            env: prod
            extra: foo
    steps:
      - name: Echo cell identity
        run: |
          echo "CELL: node=${{ matrix.node }} env=${{ matrix.env }} extra=${{ matrix.extra }}"
      - name: Verify expected cells set (cell-local check)
        run: |
          # Each cell is independent; we can't aggregate across cells in a
          # single workflow without storage. Instead, each cell asserts
          # that ITS combination is one of the expected ones — anything
          # else means the planner emitted a forbidden cell.
          NODE='${{ matrix.node }}'
          ENV='${{ matrix.env }}'
          # Forbidden cell — the exclude:'d combination
          if [ "$NODE" = "16" ] && [ "$ENV" = "prod" ]; then
            echo "FAIL: excluded cell (node=16, env=prod) was scheduled" >&2
            exit 1
          fi
          echo "OK: cell node=$NODE env=$ENV is allowed"
