# Synthetic compat fixture — verifies actions/cache works with
# ${{ hashFiles(...) }} key derivation.
#
# Two-pass test in a single workflow:
#   Step 1: write a sentinel file
#   Step 2: actions/cache restore against a key derived from hashFiles
#           on a vendored file (sentinel.txt). Cache miss is expected on
#           first run; that's not the FAIL — the FAIL is if the cache
#           shim crashes or returns malformed cache-hit metadata.
#   Step 3: actions/cache save (post step) writes the cache for next time.
#   Step 4: assert that the cache step's outputs.cache-hit is one of
#           'true' or 'false' (any other value means the shim broke its
#           contract).
#
# Per-fixture caveat: in the compat scoreboard's nightly env (fresh GH
# runner) every run is a cache miss. The fixture's PASS criterion is
# "shim doesn't crash, outputs are well-formed" — not "cache hit".
name: actions/cache with hashFiles
on:
  workflow_dispatch: {}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Create sentinel file (input to hashFiles)
        run: |
          echo "compat-fixture-sentinel-v1" > sentinel.txt

      - name: Cache step
        id: cache
        uses: actions/cache@v4
        with:
          path: ./_compat_cache_dir
          key: compat-${{ runner.os }}-${{ hashFiles('sentinel.txt') }}

      - name: Verify cache step output is well-formed
        run: |
          HIT='${{ steps.cache.outputs.cache-hit }}'
          # The cache shim's contract: outputs.cache-hit MUST be 'true' or
          # 'false'. Empty string, 'undefined', or any other value means
          # the shim's output protocol broke.
          if [ "$HIT" = "true" ] || [ "$HIT" = "false" ]; then
            echo "PASS: cache.outputs.cache-hit='$HIT' (well-formed)"
          else
            echo "FAIL: cache.outputs.cache-hit='$HIT' (expected 'true' or 'false')" >&2
            exit 1
          fi

      - name: Verify hashFiles produced something
        run: |
          # Asserts hashFiles() actually evaluated. If the expression
          # evaluator skipped it, the cache key would be literally
          # "compat-Linux-${{ hashFiles('sentinel.txt') }}" (with the
          # template still in it). The cache shim would still run but
          # with a malformed key — sentinel for that is the literal
          # `${{` showing up in the resolved key, which we surfaced
          # via env var below.
          test -d ./_compat_cache_dir || mkdir -p ./_compat_cache_dir
          echo "cache dir exists, proceeding"
