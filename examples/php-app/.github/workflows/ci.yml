# AUTO-GENERATED by @rehearse/ci. Do not edit by hand.
# Run: rh ci compile
# Source: .rehearse\pipelines\ci.ts
# Docs: https://rehearse.sh/docs/ci-quickstart

name: PHP app CI
on:
  pull_request: {}
  push:
    branches:
      - main
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version:
          - '8.2'
          - '8.3'
          - '8.4'
      fail-fast: false
    steps:
      - name: Checkout
        uses: 'actions/checkout@v4'
      - name: 'Setup PHP ${{ matrix.php-version }}'
        uses: 'shivammathur/setup-php@v2'
        with:
          php-version: '${{ matrix.php-version }}'
          extensions: 'mbstring, intl, json, xml'
          tools: 'composer:v2'
          coverage: none
      - name: Get Composer cache directory
        id: composer-cache
        run: 'echo "composer-cache-dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT'
      - name: Cache
        uses: 'actions/cache@v4'
        with:
          path: '${{ steps.composer-cache.outputs.composer-cache-dir }}'
          key: 'composer-${{ runner.os }}-${{ matrix.php-version }}-${{ hashFiles(''**/composer.json'') }}'
          restore-keys: 'composer-${{ runner.os }}-${{ matrix.php-version }}-'
      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Static analysis (PHPStan)
        run: composer analyse
      - name: Unit tests (PHPUnit)
        run: composer test
