name: dotnet app CI
on:
  pull_request: {}
  push:
    branches:
      - main
jobs:
  test:
    name: test
    runs-on: ubicloud-standard-4
    strategy:
      matrix:
        framework:
          - net8.0
          - net9.0
      fail-fast: false
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
    steps:
      - name: Checkout
        uses: 'actions/checkout@v4'
      - name: Setup .NET
        uses: 'actions/setup-dotnet@v4'
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - name: Cache
        uses: 'actions/cache@v4'
        with:
          path: ~/.nuget/packages
          key: 'nuget-${{ runner.os }}-${{ hashFiles(''**/*.csproj'', ''**/global.json'') }}'
          restore-keys: 'nuget-${{ runner.os }}-'
      - name: Restore
        run: dotnet restore MyApp.sln
      - name: 'Build (${{ matrix.framework }})'
        run: 'dotnet build MyApp.sln --no-restore --configuration Release --framework ${{ matrix.framework }}'
      - name: 'Test (${{ matrix.framework }})'
        run: 'dotnet test MyApp.sln --no-build --configuration Release --framework ${{ matrix.framework }} --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults --collect:"XPlat Code Coverage"'
      - name: 'Upload test-results-${{ matrix.framework }}'
        uses: 'actions/upload-artifact@v4'
        with:
          name: 'test-results-${{ matrix.framework }}'
          path: TestResults/
          if-no-files-found: warn
