name: Matrix
on:
  pull_request: {}
jobs:
  test:
    name: test
    runs-on: ubicloud-standard-2
    strategy:
      matrix:
        node:
          - '18'
          - '20'
          - '22'
      fail-fast: false
    steps:
      - name: Checkout
        uses: 'actions/checkout@v4'
      - name: 'Setup Node.js ${{ matrix.node }}'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '${{ matrix.node }}'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
