name: Full
on:
  pull_request: {}
  schedule:
    - cron: '0 6 * * *'
permissions: read-all
concurrency:
  group: 'full-${{ github.ref }}'
  cancel-in-progress: true
env:
  CI: 'true'
jobs:
  test:
    name: test
    runs-on: ubuntu-latest-4-cores
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: 'actions/checkout@v4'
      - name: Setup Node.js 20
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
