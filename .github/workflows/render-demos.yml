name: render-demos
# Renders VHS .tape files into .mp4 / .gif on a Linux runner and uploads the
# results as artifacts. Run manually:
#   gh workflow run render-demos.yml -f tape=demos/pro-elevator.tape
#
# Requires repo secret REHEARSE_TOKEN_DEMO (a real Pro API key) so the
# `runner run --remote` lines actually hit a VM.

on:
  workflow_dispatch:
    inputs:
      tape:
        description: 'Tape file to render (e.g. demos/pro-elevator.tape)'
        required: true
        default: 'demos/pro-elevator.tape'

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: charmbracelet/vhs-action@v2
        # The action installs vhs + ttyd + ffmpeg + JetBrains Mono on
        # its own. Pre-installing any of them races with the action's
        # installer, which is why earlier attempts failed at "Failed to
        # install ffmpeg".
        with:
          install-fonts: true

      - name: Install rehearse runner
        run: npm install -g @rehearse/runner@latest

      - name: Render tape
        env:
          REHEARSE_TOKEN_DEMO: ${{ secrets.REHEARSE_TOKEN_DEMO }}
        run: |
          if [ -z "${REHEARSE_TOKEN_DEMO}" ]; then
            echo "::warning::REHEARSE_TOKEN_DEMO secret not set; --remote lines will fail"
          fi
          vhs "${{ inputs.tape }}"

      - name: Upload mp4
        uses: actions/upload-artifact@v5
        with:
          name: demo-mp4
          path: demos/*.mp4
          retention-days: 30

      - name: Upload gif (if produced)
        uses: actions/upload-artifact@v5
        if: hashFiles('demos/*.gif') != ''
        with:
          name: demo-gif
          path: demos/*.gif
          retention-days: 30
