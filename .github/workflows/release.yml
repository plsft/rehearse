name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    name: publish
    runs-on: ubicloud-standard-2
    steps:
      - name: Checkout
        uses: 'actions/checkout@v4'
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: 'pnpm/action-setup@v4'
        with:
          version: 9.15.0
      - name: Setup Node 22
        uses: 'actions/setup-node@v4'
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: 'Build @gitgate/git-core'
        run: 'pnpm --filter @gitgate/git-core build'
      - name: 'Build @gitgate/ci'
        run: 'pnpm --filter @gitgate/ci build'
      - name: Build gg
        run: pnpm --filter gg build
      - name: 'Publish @gitgate/git-core'
        run: 'pnpm --filter @gitgate/git-core publish --access public --no-git-checks'
        env:
          NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}'
      - name: 'Publish @gitgate/ci'
        run: 'pnpm --filter @gitgate/ci publish --access public --no-git-checks'
        env:
          NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}'
      - name: Publish gg
        run: pnpm --filter gg publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}'
