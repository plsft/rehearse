# AUTO-GENERATED by @gitgate/ci. Do not edit by hand.
# Run: gg ci compile
# Source: .gitgate\pipelines\bench.ts
# Docs: https://gitgate.com/docs/ci-quickstart

name: Bench
on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 * * 1'
permissions:
  contents: read
jobs:
  bench:
    name: bench
    runs-on: '${{ matrix.os }}'
    timeout-minutes: 25
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
      fail-fast: false
    steps:
      - name: Checkout
        uses: 'actions/checkout@v4'
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: 'pnpm/action-setup@v4'
        with:
          version: 9.15.0
      - name: Setup Node 22
        uses: 'actions/setup-node@v4'
        with:
          node-version: '22'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build runner
        run: 'pnpm --filter @gitgate/runner build'
      - name: Install bun (for hono-bun target)
        uses: 'oven-sh/setup-bun@v2'
        with:
          bun-version: latest
      - name: Install act
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            curl -sL https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash -s -- -b /usr/local/bin
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install act || true
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            choco install act-cli -y || true
          fi
          act --version
        shell: bash
      - name: Clone hono fixture
        run: 'git clone --depth 1 https://github.com/honojs/hono.git poc/playground/hono'
        shell: bash
      - name: Pre-pull Docker images
        run: |
          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            docker pull node:22-bookworm-slim &
            docker pull postgres:16-alpine &
            docker pull catthehacker/ubuntu:act-latest &
            wait
            echo "DOCKER_AVAILABLE=true" >> "$GITHUB_ENV"
          else
            echo "::warning::Docker not running on $RUNNER_OS — service-postgres + container bench will skip"
            echo "DOCKER_AVAILABLE=false" >> "$GITHUB_ENV"
          fi
        shell: bash
      - name: 'Bench: host backend (our-ci)'
        run: 'pnpm tsx bench/compare.ts --skip-cold --only our-ci > "bench-${RUNNER_OS}-host.txt" 2>&1 || true'
        shell: bash
      - name: 'Bench: matrix workflow'
        run: 'pnpm tsx bench/compare.ts --skip-cold --only node-matrix > "bench-${RUNNER_OS}-matrix.txt" 2>&1 || true'
        shell: bash
      - name: 'Bench: real OSS workflow'
        run: |
          if command -v bun >/dev/null 2>&1; then
            pnpm tsx bench/compare.ts --skip-cold --only hono-bun > "bench-${RUNNER_OS}-hono-bun.txt" 2>&1 || true
          else
            echo "skipped: bun not on PATH for $RUNNER_OS" > "bench-${RUNNER_OS}-hono-bun.txt"
          fi
        shell: bash
      - name: 'Bench: services (postgres)'
        run: |
          if [ "$DOCKER_AVAILABLE" = "true" ]; then
            pnpm tsx bench/compare.ts --skip-cold --only service-postgres > "bench-${RUNNER_OS}-postgres.txt" 2>&1 || true
          else
            echo "skipped: Docker not available on $RUNNER_OS" > "bench-${RUNNER_OS}-postgres.txt"
          fi
        shell: bash
        env:
          DOCKER_AVAILABLE: '${{ env.DOCKER_AVAILABLE }}'
      - name: Upload bench results
        uses: 'actions/upload-artifact@v4'
        with:
          name: 'bench-results-${{ runner.os }}'
          path: 'bench-*.txt'
