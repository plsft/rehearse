# AUTO-GENERATED by @gitgate/ci. Do not edit by hand.
# Run: gg ci compile
# Source: .gitgate\pipelines\bench.ts
# Docs: https://gitgate.com/docs/ci-quickstart

name: Bench
on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 * * 1'
permissions:
  contents: read
jobs:
  bench:
    name: bench
    runs-on: '${{ matrix.os }}'
    timeout-minutes: 30
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
      fail-fast: false
    steps:
      - name: Checkout
        uses: 'actions/checkout@v4'
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: 'pnpm/action-setup@v4'
        with:
          version: 9.15.0
      - name: Setup Node 22
        uses: 'actions/setup-node@v4'
        with:
          node-version: '22'
          cache: pnpm
      - name: Setup Bun (for hono-bun target)
        uses: 'oven-sh/setup-bun@v2'
        with:
          bun-version: latest
      - name: Install
        run: pnpm install --frozen-lockfile
        shell: bash
      - name: Build runner
        run: 'pnpm --filter @gitgate/runner build'
        shell: bash
      - name: Install act (Linux only)
        if: 'runner.os == ''Linux'''
        run: 'curl -sL https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash -s -- -b /usr/local/bin && act --version'
        shell: bash
      - name: Clone hono fixture
        run: 'git clone --depth 1 https://github.com/honojs/hono.git poc/playground/hono'
        shell: bash
      - name: Pre-pull Docker images (Linux only)
        if: 'runner.os == ''Linux'''
        run: 'docker pull node:22-bookworm-slim & docker pull postgres:16-alpine & docker pull catthehacker/ubuntu:act-latest & wait'
        shell: bash
        continue-on-error: true
      - name: 'Bench: our-ci'
        run: 'pnpm tsx bench/compare.ts --skip-cold --only our-ci | tee "bench-${RUNNER_OS}-our-ci.txt"'
        shell: bash
        continue-on-error: true
      - name: 'Bench: node-matrix'
        run: 'pnpm tsx bench/compare.ts --skip-cold --only node-matrix | tee "bench-${RUNNER_OS}-node-matrix.txt"'
        shell: bash
        continue-on-error: true
      - name: 'Bench: hono-bun'
        run: 'pnpm tsx bench/compare.ts --skip-cold --only hono-bun | tee "bench-${RUNNER_OS}-hono-bun.txt"'
        shell: bash
        continue-on-error: true
      - name: 'Bench: hono-node-matrix'
        run: 'pnpm tsx bench/compare.ts --skip-cold --only hono-node-matrix | tee "bench-${RUNNER_OS}-hono-node-matrix.txt"'
        shell: bash
        continue-on-error: true
      - name: 'Bench: service-postgres'
        if: 'runner.os == ''Linux'''
        run: 'pnpm tsx bench/compare.ts --skip-cold --only service-postgres | tee "bench-${RUNNER_OS}-service-postgres.txt"'
        shell: bash
        continue-on-error: true
      - name: Upload bench results
        uses: 'actions/upload-artifact@v4'
        with:
          name: 'bench-results-${{ runner.os }}'
          path: 'bench-*.txt'
          if-no-files-found: warn
